name: "🧹 Tech Debt / Refactor"
description: Mejora técnica, deuda o hardening
title: "[DEBT] "
labels: ["type: tech-debt", "status: triage"]
body:
  - type: textarea
    id: context
    attributes:
      label: Contexto
      placeholder: "Actualmente la capa de servicios mezcla lógica de validación y mapeo..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Propuesta técnica
      placeholder: "Introducir DTO mapper, centralizar validación, añadir tests..."
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Riesgos / compatibilidad
      placeholder: "Posibles cambios en contrato API, migraciones..."
