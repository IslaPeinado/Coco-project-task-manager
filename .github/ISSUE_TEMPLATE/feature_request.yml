name: "Feature request"
description: Propuesta funcional con impacto claro
title: "[FEAT] "
labels: ["type: feature", "status: triage"]

body:
  - type: dropdown
    id: area
    attributes:
      label: Área
      options:
        - Frontend (Angular)
        - Backend (Spring Boot)
        - API / Contrato
        - Database (PostgreSQL)
        - CI / DevOps
    validations:

  - type: textarea
    id: descripcion
    attributes:
      label: Descripción
      placeholder: "Descripción general de la tarea"


  - type: textarea
    id: problem
    attributes:
      label: Problema / necesidad
      placeholder: "Como usuario, necesito filtrar tareas por estado y prioridad..."


  - type: textarea
    id: solution
    attributes:
      label: Solucion propuesta
      description: Describe el comportamiento esperado.


  - type: textarea
    id: acceptance
    attributes:
      label: Criterios de aceptacion
      value: |
        - [ ] ...
        - [ ] ...

