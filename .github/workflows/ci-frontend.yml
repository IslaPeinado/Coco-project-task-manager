name: CI - Frontend (Angular)

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/actions/action.yml"
      - ".github/workflows/ci-frontend.yml"
  push:
    branches: ["dev", "frontend"]
    paths:
      - "frontend/**"
      - ".github/actions/action.yml"
      - ".github/workflows/ci-frontend.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect frontend directory
        id: detect-frontend
        shell: bash
        run: |
          if [ -d "frontend" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip frontend CI when directory is absent
        if: steps.detect-frontend.outputs.exists != 'true'
        shell: bash
        run: echo "frontend/ directory not found. Skipping frontend CI."

      - name: Run frontend CI composite action
        if: steps.detect-frontend.outputs.exists == 'true'
        uses: ./.github/actions
