# ============================================================
# Application
# ============================================================
spring.application.name=coco
server.port=8080

# ============================================================
# Datasource - PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/cocoDB
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
# En desarrollo: valida y actualiza el esquema sin borrarlo
spring.jpa.hibernate.ddl-auto=validate

# Dialecto explícito para PostgreSQL (importante)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Mostrar SQL en consola (útil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Timezone coherente con TIMESTAMPTZ
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================================
# Spring Security
# ============================================================
# Desactivar comportamiento por defecto de login form
spring.security.user.name=disabled
spring.security.user.password=disabled

# ============================================================
# JWT
# ============================================================
# ⚠️ IMPORTANTE:
# Usa un secreto largo (mínimo 32 caracteres, idealmente 64+)
# En producción esto debería venir de una variable de entorno
app.jwt.secret="DEV_SECRET_2639925bfdd1c15d8831b64146d0b923509d227940717dfdc94668bee20f5700"

# Token de acceso (minutos)
app.jwt.access-exp-minutes=15

# Token de refresco (días)
app.jwt.refresh-exp-days=7

# ============================================================
# CORS (Angular / Frontend)
# ============================================================
# Si Angular corre en otro puerto (ej. 4200)
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Authorization,Content-Type
spring.web.cors.allow-credentials=true

# ============================================================
# Logging (útil para seguridad y debug)
# ============================================================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
