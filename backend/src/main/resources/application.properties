# --- App ---
spring.application.name=coco
server.port=8080
server.shutdown=graceful

# --- Jackson / fechas ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# --- JPA / Hibernate ---
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- OpenAPI / Swagger ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# --- Logging ---
logging.level.root=INFO
logging.level.org.springframework=INFO

# --- Custom: JWT ---
coco.jwt.secret=CHANGE_ME_LOCAL_ONLY
coco.jwt.expiration-seconds=3600
coco.jwt.issuer=coco

# --- Custom: CORS (valores por defecto, local los sobreescribe) ---
coco.cors.allowed-origins=http://localhost:4200
coco.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
coco.cors.allowed-headers=Authorization,Content-Type
coco.cors.allow-credentials=true
