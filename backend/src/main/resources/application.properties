# --- App ---
spring.application.name=coco
server.port=8080
server.shutdown=graceful

# --- JPA / Hibernate ---
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://localhost:5432/coco
spring.flyway.user=coco_user
spring.flyway.password=coco_user
spring.flyway.locations=classpath:db/migration


# --- OpenAPI / Swagger ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# --- Logging ---
logging.level.root=INFO
logging.level.org.springframework=INFO

# --- Custom: JWT ---
coco.jwt.secret="LOCAL_DEV_SECRET_4b94c0ccd6c79cc9f32d318ef8b879d1282396d08b2434f72981a46dfe7dbb4d"
coco.jwt.expiration-seconds=3600
coco.jwt.issuer=coco

# --- Custom: CORS (valores por defecto, local los sobreescribe) ---
coco.cors.allowed-origins=http://localhost:4200
coco.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
coco.cors.allowed-headers=Authorization,Content-Type
coco.cors.allow-credentials=true

# --- Project purge (archived projects) ---
coco.project.purge.enabled=true
coco.project.purge.retention-days=10
coco.project.purge.cron=0 0 3 * * *
