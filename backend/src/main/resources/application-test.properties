spring.config.activate.on-profile=test

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:coco_test}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:coco_user}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:coco_user}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# In CI the schema is initialized from infra/cocoDB.sql
spring.flyway.enabled=false

# Logging en tests
logging.level.root=WARN
logging.level.com.coco=INFO

# JWT para tests (fijo)
coco.jwt.secret=TEST_SECRET
coco.jwt.expiration-seconds=3600

# CORS
coco.cors.allowed-origins=http://localhost
coco.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
coco.cors.allowed-headers=Authorization,Content-Type
coco.cors.allow-credentials=true
