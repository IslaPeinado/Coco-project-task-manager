spring.config.activate.on-profile=test

spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:h2:mem:coco_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:coco_user}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:coco_user}}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# In CI the schema is initialized from infra/cocoDB.sql
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}

# Logging en tests
logging.level.root=WARN
logging.level.com.coco=INFO

# JWT para tests (fijo)
coco.jwt.secret=${COCO_JWT_SECRET:TEST_SECRET_032c37e71fc74611174dfb03d65c3e941767a794377a0eaa3aba06da064951f6}
coco.jwt.expiration-seconds=3600
coco.jwt.issuer=${COCO_JWT_ISSUER:coco-test}

# CORS
coco.cors.allowed-origins=http://localhost
coco.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
coco.cors.allowed-headers=Authorization,Content-Type
coco.cors.allow-credentials=true
