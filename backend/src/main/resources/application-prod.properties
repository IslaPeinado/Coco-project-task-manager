spring.config.activate.on-profile=prod

server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.root=INFO
logging.level.com.coco=INFO

coco.jwt.secret=${JWT_SECRET}
coco.jwt.expiration-seconds=${JWT_EXP_SECONDS:3600}
coco.jwt.issuer=${JWT_ISSUER:coco}

coco.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
coco.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
coco.cors.allowed-headers=Authorization,Content-Type
coco.cors.allow-credentials=true
