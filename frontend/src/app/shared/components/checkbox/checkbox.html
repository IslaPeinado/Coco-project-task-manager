<label class="coco-checkbox" [class.coco-checkbox--disabled]="disabled" [attr.for]="id">
  <span class="coco-checkbox__control">
    <input
      class="coco-checkbox__input"
      [id]="id"
      type="checkbox"
      [checked]="checked"
      [disabled]="disabled"
      (change)="handleChange($event)"
      (blur)="handleBlur()"
    />
    <span class="coco-checkbox__box" [class.coco-checkbox__box--checked]="checked">
      @if (checked) {
        <span class="coco-checkbox__mark">✓</span>
      }
    </span>
  </span>

  @if (label || hint) {
    <span class="coco-checkbox__content">
      @if (label) {
        <span class="coco-checkbox__label">{{ label }}</span>
      }
      @if (hint) {
        <span class="coco-checkbox__hint">{{ hint }}</span>
      }
    </span>
  }
</label>
