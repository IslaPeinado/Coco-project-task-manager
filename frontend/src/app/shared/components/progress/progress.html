<div class="coco-progress">
  @if (showLabel) {
    <div class="coco-progress__meta">
      <span>Progress</span>
      <strong>{{ percentage | number: '1.0-0' }}%</strong>
    </div>
  }

  <div class="coco-progress__track">
    <span
      class="coco-progress__bar"
      [class.coco-progress__bar--primary]="tone === 'primary'"
      [class.coco-progress__bar--success]="tone === 'success'"
      [class.coco-progress__bar--warning]="tone === 'warning'"
      [style.width.%]="percentage"
    ></span>
  </div>
</div>
