<nav class="coco-tabs" [class.coco-tabs--stretch]="stretch" aria-label="Tabs">
  @for (item of items; track item.id) {
    <button
      class="coco-tabs__item"
      [class.coco-tabs__item--active]="activeId === item.id"
      [class.coco-tabs__item--stretch]="stretch"
      [disabled]="item.disabled"
      type="button"
      (click)="setActive(item.id, item.disabled)"
    >
      <span>{{ item.label }}</span>
      @if (item.badge) {
        <span class="coco-tabs__badge">{{ item.badge }}</span>
      }
    </button>
  }
</nav>
