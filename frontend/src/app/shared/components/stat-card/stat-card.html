<article
  class="coco-stat-card"
  [class.coco-stat-card--primary]="tone === 'primary'"
  [class.coco-stat-card--success]="tone === 'success'"
  [class.coco-stat-card--warning]="tone === 'warning'"
  [class.coco-stat-card--danger]="tone === 'danger'"
>
  <div class="coco-stat-card__top">
    @if (icon) {
      <span class="coco-stat-card__icon" aria-hidden="true">{{ icon }}</span>
    }
    @if (trend) {
      <span class="coco-stat-card__trend">{{ trend }}</span>
    }
  </div>
  <p class="coco-stat-card__label">{{ label }}</p>
  <strong class="coco-stat-card__value">{{ value }}</strong>
</article>
