<label class="coco-textarea" [attr.for]="id">
  @if (label) {
    <span class="coco-textarea__label">
      {{ label }}
      @if (required) {
        <span class="coco-textarea__required">*</span>
      }
    </span>
  }

  <span
    class="coco-textarea__control"
    [class.coco-textarea__control--focused]="isFocused"
    [class.coco-textarea__control--error]="!!error"
  >
    <textarea
      class="coco-textarea__field"
      [class.coco-textarea__field--no-resize]="resize === 'none'"
      [id]="id"
      [rows]="rows"
      [placeholder]="placeholder"
      [value]="value"
      [disabled]="disabled"
      [required]="required"
      (focus)="isFocused = true"
      (blur)="handleBlur()"
      (input)="handleInput($event)"
    ></textarea>
  </span>

  @if (error) {
    <span class="coco-textarea__message coco-textarea__message--error">{{ error }}</span>
  } @else if (hint) {
    <span class="coco-textarea__message">{{ hint }}</span>
  }
</label>
