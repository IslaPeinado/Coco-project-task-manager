<section
  class="coco-toast"
  [class.coco-toast--info]="tone === 'info'"
  [class.coco-toast--success]="tone === 'success'"
  [class.coco-toast--warning]="tone === 'warning'"
  [class.coco-toast--danger]="tone === 'danger'"
  role="status"
>
  <div class="coco-toast__content">
    @if (title) {
      <strong class="coco-toast__title">{{ title }}</strong>
    }
    @if (description) {
      <p class="coco-toast__description">{{ description }}</p>
    }
  </div>

  @if (closable) {
    <button class="coco-toast__close" type="button" aria-label="Dismiss" (click)="handleDismiss()">×</button>
  }
</section>
