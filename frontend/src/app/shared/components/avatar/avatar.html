<span
  class="coco-avatar"
  [class.coco-avatar--sm]="size === 'sm'"
  [class.coco-avatar--md]="size === 'md'"
  [class.coco-avatar--lg]="size === 'lg'"
  [class.coco-avatar--xl]="size === 'xl'"
>
  @if (src) {
    <img class="coco-avatar__image" [src]="src" [alt]="alt" />
  } @else {
    <span class="coco-avatar__fallback">{{ initials || '?' }}</span>
  }

  @if (status !== 'none') {
    <span
      class="coco-avatar__status"
      [class.coco-avatar__status--online]="status === 'online'"
      [class.coco-avatar__status--busy]="status === 'busy'"
      [class.coco-avatar__status--away]="status === 'away'"
    ></span>
  }
</span>
