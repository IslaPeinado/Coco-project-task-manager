<button
  class="coco-icon-button"
  [class.coco-icon-button--surface]="variant === 'surface'"
  [class.coco-icon-button--ghost]="variant === 'ghost'"
  [class.coco-icon-button--primary]="variant === 'primary'"
  [class.coco-icon-button--sm]="size === 'sm'"
  [class.coco-icon-button--md]="size === 'md'"
  [class.coco-icon-button--lg]="size === 'lg'"
  [disabled]="disabled"
  [attr.aria-label]="ariaLabel"
  [attr.type]="type"
>
  <ng-content></ng-content>
</button>
