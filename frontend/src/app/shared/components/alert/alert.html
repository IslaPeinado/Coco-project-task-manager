<section
  class="coco-alert"
  [class.coco-alert--info]="variant === 'info'"
  [class.coco-alert--success]="variant === 'success'"
  [class.coco-alert--warning]="variant === 'warning'"
  [class.coco-alert--danger]="variant === 'danger'"
  role="status"
>
  <span class="coco-alert__icon" aria-hidden="true">{{ icon }}</span>
  <div class="coco-alert__content">
    @if (title) {
      <h4 class="coco-alert__title">{{ title }}</h4>
    }
    @if (description) {
      <p class="coco-alert__description">{{ description }}</p>
    }
    <ng-content></ng-content>
  </div>
</section>
