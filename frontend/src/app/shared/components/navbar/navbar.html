<header class="coco-navbar" [class.coco-navbar--compact]="compact" [class.coco-navbar--collapsed]="collapsed">
  <div class="coco-navbar__brand-shell">
    <button
      class="coco-navbar__menu-toggle"
      type="button"
      aria-label="Toggle navigation"
      [attr.aria-expanded]="mobileMenuOpen"
      (click)="toggleMobileMenu()"
    >
      <span class="material-symbols-outlined">{{ mobileMenuOpen ? 'close' : 'menu' }}</span>
    </button>

    <div class="coco-navbar__brand">
      <div class="coco-navbar__brand-icon" aria-hidden="true">
        <img src="../../assets/Coco_Logo.svg">
      </div>

      <div class="coco-navbar__brand-copy">
        <strong class="coco-navbar__brand-title">{{ brand }}</strong>
        <span class="coco-navbar__brand-caption">{{ brandCaption }}</span>
      </div>
    </div>

    @if (collapsible) {
      <button
        class="coco-navbar__collapse-toggle"
        type="button"
        [attr.aria-label]="collapsed ? expandAriaLabel : collapseAriaLabel"
        [attr.aria-pressed]="collapsed"
        [attr.title]="collapsed ? expandAriaLabel : collapseAriaLabel"
        (click)="toggleCollapsed()"
      >
        <span class="material-symbols-outlined">{{ collapsed ? 'keyboard_double_arrow_right' : 'keyboard_double_arrow_left' }}</span>
      </button>
    }
  </div>

  @if (showSearch && !collapsed) {
    <label class="coco-navbar__search">
      <span class="material-symbols-outlined coco-navbar__search-icon">search</span>
      <input
        class="coco-navbar__search-input"
        type="search"
        [value]="searchValue"
        [placeholder]="searchPlaceholder"
        (input)="onSearch($any($event.target).value)"
      />
    </label>
  }

  <nav class="coco-navbar__nav" [class.coco-navbar__nav--open]="mobileMenuOpen" aria-label="Primary">
    @for (link of links; track link.id) {
      <a
        class="coco-navbar__link"
        [class.coco-navbar__link--active]="isActive(link)"
        [class.coco-navbar__link--disabled]="link.disabled"
        [attr.href]="link.href || null"
        [attr.aria-current]="isActive(link) ? 'page' : null"
        [attr.aria-label]="collapsed ? link.label : null"
        [attr.title]="collapsed ? link.label : null"
        (click)="onLinkClick(link)"
      >
        @if (link.icon) {
          <span class="material-symbols-outlined coco-navbar__link-icon">{{ link.icon }}</span>
        }

        @if (!collapsed) {
          <span class="coco-navbar__link-label">{{ link.label }}</span>
        }

        @if (link.badge && !collapsed) {
          <span class="coco-navbar__link-badge">{{ link.badge }}</span>
        }
      </a>
    }
  </nav>

  <div class="coco-navbar__actions">
    @for (action of actions; track action.id) {
      <button
        class="coco-navbar__action"
        type="button"
        [attr.aria-label]="action.ariaLabel"
        [attr.title]="action.ariaLabel"
        (click)="onActionClick(action.id)"
      >
        <span class="material-symbols-outlined">{{ action.icon }}</span>

        @if (action.badge) {
          <span class="coco-navbar__action-badge"></span>
        }
      </button>
    }

    <button class="coco-navbar__user" type="button" (click)="onUserClick()">
      <div class="coco-navbar__user-copy" [attr.aria-hidden]="collapsed">
        @if (userName) {
          <strong class="coco-navbar__user-name">{{ userName }}</strong>
        }

        @if (userRole) {
          <span class="coco-navbar__user-role">{{ userRole }}</span>
        }
      </div>

      <app-avatar
        [src]="userAvatarSrc"
        [alt]="userAvatarAlt"
        [name]="userName"
        size="md"
      />
    </button>
  </div>
</header>
